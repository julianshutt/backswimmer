<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backswimmers — Pond Pursuit</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #0a1628;
        color: #e8f4ff;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #death-overlay.hidden {
        display: none !important;
      }
      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        padding: 12px 14px;
        background: rgba(8, 20, 40, 0.58);
        border: 1px solid rgba(120, 200, 255, 0.28);
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.42;
        pointer-events: none;
        max-width: min(294px, 46vw);
      }
      #hud strong {
        color: #7fd7ff;
      }
      #hud kbd {
        display: inline-block;
        padding: 0 5px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-size: 11px;
      }
      #score-hud {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 6;
        padding: 12px 16px;
        background: rgba(8, 20, 40, 0.46);
        border: 1px solid rgba(120, 200, 255, 0.26);
        border-radius: 8px;
        max-width: min(220px, 44vw);
        pointer-events: none;
      }
      #death-overlay {
        position: fixed;
        inset: 0;
        z-index: 14;
        pointer-events: none;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a1628;
        font-size: 18px;
        z-index: 10;
      }
      #loading.hidden {
        display: none;
      }
      #splash-inner.hidden,
      #loading-busy.hidden {
        display: none;
      }
      #splash-inner {
        box-sizing: border-box;
        text-align: center;
        padding: clamp(22px, 5vw, 44px);
        width: min(480px, calc(100vw - 36px));
        max-width: 94vw;
        border-radius: 12px;
        background: rgba(8, 20, 40, 0.88);
        border: 1px solid rgba(120, 200, 255, 0.38);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      #splash-inner .splash-title {
        margin: 0;
        padding: 0 clamp(4px, 2vw, 12px);
        font-size: clamp(20px, 5vmin, 32px);
        font-weight: 700;
        letter-spacing: 0.055em;
        text-transform: uppercase;
        line-height: 1.08;
        color: #f0f8ff;
        text-shadow: 0 2px 28px rgba(120, 200, 255, 0.4);
        text-wrap: balance;
      }
      #splash-inner .splash-sub {
        margin-top: 14px;
        font-size: 14px;
        line-height: 1.45;
        opacity: 0.82;
      }
      #splash-error {
        margin-top: 12px;
        font-size: 13px;
        line-height: 1.35;
        color: #ffb8b8;
      }
      #start-game {
        margin-top: 22px;
        padding: 12px 32px;
        font-size: 16px;
        font-weight: 650;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        color: #0a1628;
        background: linear-gradient(180deg, #9fe8ff 0%, #4ec8ee 100%);
        border: none;
        border-radius: 8px;
        box-shadow: 0 6px 20px rgba(78, 200, 238, 0.35);
      }
      #start-game:hover {
        filter: brightness(1.06);
      }
      #loading-busy {
        text-align: center;
        padding: 28px;
        max-width: min(460px, 92vw);
        line-height: 1.5;
      }
      #pause-overlay {
        position: fixed;
        inset: 0;
        z-index: 15;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        background: rgba(6, 18, 36, 0.48);
        backdrop-filter: blur(3px);
      }
      #pause-overlay.hidden {
        display: none;
      }
      #pause-overlay .pause-panel {
        text-align: center;
        padding: clamp(22px, 4vw, 36px) clamp(36px, 8vw, 56px);
        border-radius: 12px;
        background: rgba(8, 20, 40, 0.88);
        border: 1px solid rgba(120, 200, 255, 0.38);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      #pause-overlay .pause-title {
        font-size: clamp(28px, 5.5vw, 46px);
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #f0f8ff;
        text-shadow: 0 2px 28px rgba(120, 200, 255, 0.4);
      }
      #pause-overlay .pause-hint {
        margin-top: 16px;
        font-size: clamp(14px, 2.2vw, 17px);
        opacity: 0.88;
        line-height: 1.45;
      }
      #pause-guide {
        margin-top: 22px;
        text-align: left;
        pointer-events: none;
      }
      #pause-overlay kbd {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 0.92em;
      }
      /** `?debug` — see `main.js` */
      #debug-track-bar {
        position: fixed;
        bottom: 14px;
        left: 12px;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: rgba(8, 20, 40, 0.92);
        border: 1px solid rgba(120, 200, 255, 0.38);
        border-radius: 8px;
        font-size: 13px;
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35);
        pointer-events: auto;
      }
      #debug-track-bar.hidden {
        display: none !important;
      }
      #debug-track-bar label {
        color: #9fe8ff;
        font-weight: 650;
      }
      #debug-track-select {
        min-width: min(340px, 72vw);
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid rgba(120, 200, 255, 0.35);
        background: rgba(12, 28, 48, 0.95);
        color: #e8f4ff;
        font-size: 13px;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
          "js-yaml": "https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.mjs"
        }
      }
    </script>
  </head>
  <body>
    <div id="loading">
      <div id="splash-inner">
        <div class="splash-title">Backswimmers</div>
        <p class="splash-sub">Random procedural pond · press Enter or Play to dive in.</p>
        <p id="splash-error" aria-live="polite"></p>
        <button type="button" id="start-game">Play</button>
      </div>
      <div id="loading-busy" class="hidden" aria-live="polite">
        <p id="loading-busy-msg"></p>
      </div>
    </div>
    <canvas id="game"></canvas>
    <div id="hud"><div id="hud-stats"></div></div>
    <div id="score-hud" aria-live="polite"></div>
    <div id="death-overlay" class="hidden" aria-hidden="true"></div>
    <div id="pause-overlay" class="hidden" aria-hidden="true">
      <div class="pause-panel">
        <div class="pause-title">Paused</div>
        <div class="pause-hint">Press <kbd>Esc</kbd> to resume</div>
        <div id="pause-guide"></div>
      </div>
    </div>
    <div id="debug-track-bar" class="hidden" aria-hidden="true">
      <label for="debug-track-select">Track</label>
      <select id="debug-track-select" aria-label="Load track"></select>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
