<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backswimmers — Pond Pursuit</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #0a1628;
        color: #e8f4ff;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #death-overlay.hidden {
        display: none !important;
      }
      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        padding: 12px 14px;
        background: rgba(8, 20, 40, 0.58);
        border: 1px solid rgba(120, 200, 255, 0.28);
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.42;
        pointer-events: none;
        max-width: min(294px, 46vw);
      }
      #hud strong {
        color: #7fd7ff;
      }
      #hud kbd {
        display: inline-block;
        padding: 0 5px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-size: 11px;
      }
      #score-hud {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 6;
        padding: 12px 16px;
        background: rgba(8, 20, 40, 0.46);
        border: 1px solid rgba(120, 200, 255, 0.26);
        border-radius: 8px;
        max-width: min(220px, 44vw);
        pointer-events: none;
      }
      #death-overlay {
        position: fixed;
        inset: 0;
        z-index: 14;
        pointer-events: none;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a1628;
        font-size: 18px;
        z-index: 10;
      }
      #loading.hidden {
        display: none;
      }
      #track-select {
        position: fixed;
        right: 12px;
        top: 108px;
        z-index: 5;
      }
      #track-select label {
        font-size: 12px;
        margin-right: 6px;
        opacity: 0.85;
      }
      #track-select select {
        background: rgba(8, 20, 40, 0.9);
        color: #e8f4ff;
        border: 1px solid rgba(120, 200, 255, 0.35);
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 13px;
      }
      #pause-overlay {
        position: fixed;
        inset: 0;
        z-index: 15;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        background: rgba(6, 18, 36, 0.48);
        backdrop-filter: blur(3px);
      }
      #pause-overlay.hidden {
        display: none;
      }
      #pause-overlay .pause-panel {
        text-align: center;
        padding: clamp(22px, 4vw, 36px) clamp(36px, 8vw, 56px);
        border-radius: 12px;
        background: rgba(8, 20, 40, 0.88);
        border: 1px solid rgba(120, 200, 255, 0.38);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      #pause-overlay .pause-title {
        font-size: clamp(28px, 5.5vw, 46px);
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #f0f8ff;
        text-shadow: 0 2px 28px rgba(120, 200, 255, 0.4);
      }
      #pause-overlay .pause-hint {
        margin-top: 16px;
        font-size: clamp(14px, 2.2vw, 17px);
        opacity: 0.88;
        line-height: 1.45;
      }
      #pause-guide {
        margin-top: 22px;
        text-align: left;
        pointer-events: none;
      }
      #pause-overlay kbd {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 0.92em;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
          "js-yaml": "https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.mjs"
        }
      }
    </script>
  </head>
  <body>
    <div id="loading">Loading track…</div>
    <canvas id="game"></canvas>
    <div id="hud"><div id="hud-stats"></div></div>
    <div id="score-hud" aria-live="polite"></div>
    <div id="death-overlay" class="hidden" aria-hidden="true"></div>
    <div id="track-select">
      <label for="track-file">Course</label>
      <select id="track-file" aria-label="Select course YAML">
        <option value="tracks/tutorial.yaml">Tutorial pond</option>
        <option value="tracks/lily_loop.yaml">Lily loop</option>
        <option value="procedural">Procedural (random)</option>
      </select>
    </div>
    <div id="pause-overlay" class="hidden" aria-hidden="true">
      <div class="pause-panel">
        <div class="pause-title">Paused</div>
        <div class="pause-hint">Press <kbd>Esc</kbd> to resume</div>
        <div id="pause-guide"></div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
